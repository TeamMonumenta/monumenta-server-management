apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-logger
  namespace: play
  labels:
    app: chat-logger
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: chat-logger
  template:
    metadata:
      labels:
        app: chat-logger
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - monumenta-18
      volumes:
        - name: chat-logger-logs
          hostPath:
            type: Directory
            path: /nfs/chat-logger/play/logs
      containers:
      - name: chat-logger
        image: ghcr.io/teammonumenta/monumenta-automation/monumenta-chat-logger-rust:latest
        tty: false
        stdin: false
        volumeMounts:
        - name: chat-logger-logs
          mountPath: /logs
        env:
        # Unique name this logger appears as on the RabbitMQ network.
        # Should not conflict with any shard name.
        - name: SHARD_NAME
          value: chat-logger
        # RabbitMQ connection string.
        - name: AMQP_URI
          value: "amqp://guest:guest@rabbitmq:5672"
        resources:
          limits:
            cpu: 100m
            memory: 32Mi
          requests:
            cpu: 10m
            memory: 16Mi
